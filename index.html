<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevOps Learning Progress</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>DevOps Journey Tracker</h1>
        <p>Track your milestones as you master Azure DevOps.</p>
        
        <div class="input-area">
            <input type="text" id="milestoneInput" placeholder="e.g., Mastered Git branching...">
            <button id="addBtn">Add Milestone</button>
        </div>

        <ul id="milestoneList">
            </ul>
    </div>
    <script src="script.js"></script>
</body>
</html>
